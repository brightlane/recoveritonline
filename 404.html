<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManyChat Strategy Vault | 800+ Automation Blueprints</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #222;
            --bg: #f4f7f9;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 40px 20px; 
            background: var(--bg); 
            color: var(--dark);
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            color: var(--dark);
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        /* The Grid System */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            list-style: none; 
            padding: 0; 
        }

        /* Strategy Cards */
        .grid li a { 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            padding: 25px; 
            background: white; 
            text-decoration: none; 
            color: var(--dark); 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
            border-top: 5px solid var(--primary);
        }

        .grid li a:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.1); 
            border-top-color: #0056b3;
        }

        .strategy-name {
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: #555;
        }

        .strategy-number {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .badge {
            display: inline-block;
            margin-top: 15px;
            font-size: 12px;
            background: #e7f3ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🚀 ManyChat Strategy Vault</h1>
            <p class="subtitle">Complete 2650+ Word Implementation Blueprints for Advanced Marketers</p>
        </header>

        <ul class="grid">
            <!-- The Script dynamically inserts items here -->
            <li>
                <a href="/instagram-lead-generation-flow-1/">
                    <div>
                        <div class="strategy-name">INSTAGRAM LEAD GENERATION FLOW</div>
                        <div class="strategy-number">Strategy #1</div>
                    </div>
                    <span class="badge">47 Steps Inside</span>
                </a>
            </li>
            
            <li>
                <a href="/facebook-messenger-sales-funnel-2/">
                    <div>
                        <div class="strategy-name">FACEBOOK MESSENGER SALES FUNNEL</div>
                        <div class="strategy-number">Strategy #2</div>
                    </div>
                    <span class="badge">Technical Specs</span>
                </a>
            </li>

            <!-- ... and so on for 833 pages -->
        </ul>

        <footer>
            <p>&copy; 2026 ManyChat Strategy Vault. All Rights Reserved.</p>
        </footer>
    </div>

</body>
</html>
