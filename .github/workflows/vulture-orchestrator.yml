name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 1 PM UTC (9 AM EDT)
  workflow_dispatch:  # ✅ Run button enabled
  push:
    paths:
      - 'vulture-*.js'
      - 'generator-*.js'
      - 'pages/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: 🦅 Generate Vulture Pages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🦅 Run Vulture Generator
        run: |
          node vulture-generator.js 833
          node generate-index.js

      - name: 🔍 Quality Check
        run: node quality-check.js

      - name: 🗺️ Generate Sitemap
        run: node generate-sitemap.js

      - name: 📊 Commit Generated Files
        run: |
          git config user.name "Vulture Factory"
          git config user.email "vulture@brightlane.com"
          git add .
          git diff --staged --quiet || git commit -m "🦅 Vulture Sync: $(date +%Y-%m-%d)"
          git push

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🛡️ Create .nojekyll
        run: touch .nojekyll

      - name: 📦 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  health-check:
    name: 🩺 Health Check & Alert
    needs: [generate, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📊 Post Status
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.generate.result }}' === 'success' && '${{ needs.deploy.result }}' === 'success';

            github.rest.issues.createComment({
              issue_number: context.issue?.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🦅 **Vulture Factory Run**

Status: ${success ? '✅ SUCCESS' : '❌ FAILED'}
Run ID: ${{ github.run_id }}
Workflow: ${context.workflow}`
            });
