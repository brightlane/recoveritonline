name: Vulture Factory Orchestrator 🏭

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 4AM UTC
  workflow_dispatch:  # ✅ RUN BUTTON with LLM dropdown
    inputs:
      pages_to_generate:
        description: 'Pages to generate (1-250)'
        required: false
        default: '50'
        type: number
        maximum: 250
      llm_model:
        description: 'Select LLM from llms.txt 👇'
        required: false
        default: 'grok-4.1'
        type: choice
        options:
          - grok-4.1
          - claude-4.6-sonnet
          - gemini-3.1-pro
          - gpt-5.4-mini
          - glm-4.7-thinking
          - deepseek-v3.2
          - qwen3-235b
          - mistral-large-3
          - llama-4-405b
          - command-r-plus-248b
  push:
    paths:
      - 'vulture-*.js'
      - 'generator-core.js'
      - 'pages/**'
      - 'llms.txt'
      - '.github/workflows/**'

env:
  NODE_VERSION: '24'
  LLM_FILE: 'llms.txt'

concurrency:
  group: vulture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.input.outputs.pages }}
      llm: ${{ steps.input.outputs.llm }}
    steps:
      - uses: actions/checkout@v4
      - id: input
        name: 📋 Config from llms.txt
        run: |
          PAGES="${{ github.event.inputs.pages_to_generate || 50 }}"
          LLM="${{ github.event.inputs.llm_model || 'grok-4.1' }}"
          echo "pages=$PAGES" >> $GITHUB_OUTPUT
          echo "llm=$LLM" >> $GITHUB_OUTPUT
          echo "✅ $PAGES pages with $LLM ($(grep -c '^[^#]' llms.txt) models)"

  orchestrate:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.pages / 25) > 1 ? range(1, needs.setup.outputs.pages / 25 + 1) : [1] }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: 🏭 Generate ${{ matrix.chunk }} (${{ needs.setup.outputs.llm }})
        env:
          LLM_MODEL: ${{ needs.setup.outputs.llm }}
          LLM_FILE: llms.txt
          CHUNK_START: ${{ (matrix.chunk - 1) * 25 + 1 }}
          CHUNK_END: ${{ matrix.chunk * 25 }}
        run: |
          node vulture-generator.js "$CHUNK_START" "$CHUNK_END"
      - name: Quality
        run: node quality-check.js

  deploy:
    needs: orchestrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}/pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: SEO Pipeline
        run: |
          node seo-meta-injector.js
          node generate-sitemap.js  
          node generate-index.js
      - name: 🚀 Deploy Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'
      - name: Live Site
        uses: actions/deploy-pages@v4

  summary:
    needs: [deploy, setup]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Vulture Report
        run: |
          echo "✅ ${{ needs.setup.outputs.pages }} pages deployed"
          echo "🤖 LLM: ${{ needs.setup.outputs.llm }}"
          echo "🌐 ${{ github.event.repository.html_url }}/pages"
          echo "📈 Trigger: ${{ github.event_name }}"
