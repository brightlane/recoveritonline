name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      pages_to_generate:
        description: 'Pages to generate'
        required: false
        default: '50'
        type: number
      llm_model:
        description: 'Select LLM from llms.txt'
        required: false
        default: 'grok-4.1'
        type: choice
        options:
          - grok-4.1
          - claude-4.6-sonnet
          - gemini-3.1-pro
          - gpt-5.4-mini
          - glm-4.7-thinking
          - deepseek-v3.2
          - qwen3-235b
          - mistral-large-3
          - llama-4-405b
          - command-r-plus-248b
  push:
    paths:
      - 'vulture-*.js'
      - 'generator-core.js'
      - 'pages/**'
      - 'llms.txt'
      - 'package*.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ FIX Node 20 warnings
  NODE_VERSION: '24'
  CI: true

concurrency:
  group: vulture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-setup:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.set.outputs.pages }}
      llm: ${{ steps.set.outputs.llm }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          echo "pages=${{ github.event.inputs.pages_to_generate || 50 }}" >> $GITHUB_OUTPUT
          echo "llm=${{ github.event.inputs.llm_model || 'grok-4.1' }}" >> $GITHUB_OUTPUT

  generate:
    needs: test-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24 ✅
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Test generator exists
        run: |
          ls -la vulture-generator.js || echo "⚠️ vulture-generator.js missing"
      - name: Mock generate
        run: |
          echo "Mock: would generate pages ${{ needs.test-setup.outputs.pages }}"
          echo "Using LLM: ${{ needs.test-setup.outputs.llm }}"
          mkdir -p pages
          echo "<h1>Vulture Page Mock</h1>" > pages/test.html
          echo "✅ Mock success"
        # Skip real generation until scripts exist

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy mock pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  summary:
    needs: [deploy, test-setup]
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "✅ Setup complete: ${{ needs.test-setup.outputs.pages }} pages"
          echo "🤖 LLM ready: ${{ needs.test-setup.outputs.llm }}"
          echo "🌐 Live: ${{ github.event.repository.html_url }}/pages"
