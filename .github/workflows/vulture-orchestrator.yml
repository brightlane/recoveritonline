name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      pages_to_generate:
        description: 'Pages to generate'
        default: '50'
        type: number
      llm_model:
        description: 'LLM from llms.txt'
        default: 'grok-4.1'
        type: choice
        options:
          - grok-4.1
          - claude-4.6-sonnet
          - gemini-3.1-pro
          - gpt-5.4-mini
          - glm-4.7-thinking
          - deepseek-v3.2
          - qwen3-235b
          - mistral-large-3
          - llama-4-405b
          - command-r-plus-248b

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ No Node warnings
  NODE_VERSION: '24'

concurrency:
  group: vulture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ github.repository_owner }}.github.io/manychat
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate pages
        env:
          PAGES: ${{ github.event.inputs.pages_to_generate || 50 }}
          LLM: ${{ github.event.inputs.llm_model || 'grok-4.1' }}
        run: |
          mkdir -p pages
          for i in $(seq 1 $PAGES); do
            cat > pages/vulture-page-$i.html << EOF
<!DOCTYPE html>
<html>
<head>
  <title>ManyChat Vulture #$i - $(echo $LLM)</title>
  <meta name="description" content="Vulture strategy #$i generated by $LLM">
</head>
<body>
  <h1>ManyChat Vulture Strategy #$i</h1>
  <p>Generated by $LLM - Affiliate optimized</p>
  <a href="https://manychat.com?ref=vulture$i">ManyChat Affiliate</a>
</body>
</html>
EOF
          done
          echo "✅ Generated $PAGES pages"
      - name: Deploy Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'
      - name: Live deploy
        uses: actions/deploy-pages@v4
