name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      pages_to_generate:
        description: 'Pages to generate'
        required: false
        default: '50'
      llm_model:
        description: 'LLM model'
        required: false
        default: 'grok-4.1'
        type: choice
        options:
          - grok-4.1
          - claude-4.6-sonnet
          - gemini-3.1-pro
          - gpt-5.4-mini
          - glm-4.7-thinking
          - deepseek-v3.2
          - qwen3-235b
          - mistral-large-3
          - llama-4-405b
          - command-r-plus-248b

concurrency:
  group: vulture-factory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.calc.outputs.pages }}
      batches: ${{ steps.calc.outputs.batches }}
      llm: ${{ steps.calc.outputs.llm }}
    steps:
    - uses: actions/checkout@v4

    - id: calc
      run: |
        PAGES=${{ github.event.inputs.pages_to_generate || 50 }}
        BATCH_SIZE=10
        BATCHES=$(( (PAGES + BATCH_SIZE - 1) / BATCH_SIZE ))

        echo "pages=$PAGES" >> $GITHUB_OUTPUT
        echo "batches=$BATCHES" >> $GITHUB_OUTPUT
        echo "llm=${{ github.event.inputs.llm_model || 'grok-4.1' }}" >> $GITHUB_OUTPUT

  generate:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: ${{ fromJSON(needs.setup.outputs.batches) }}
    steps:
    - uses: actions/checkout@v4

    - name: Generate batch
      env:
        LLM_MODEL: ${{ needs.setup.outputs.llm }}
      run: |
        START=$(( (matrix.batch - 1) * 10 + 1 ))
        END=$(( matrix.batch * 10 ))
        node vulture-generator.js "$START" "$END"
