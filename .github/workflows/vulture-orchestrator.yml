name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      pages_to_generate:
        description: 'Pages to generate'
        default: '50'
        type: number
      llm_model:
        description: 'LLM from llms.txt'
        default: 'grok-4.1'
        type: choice
        options:
          - grok-4.1
          - claude-4.6-sonnet
          - gemini-3.1-pro
          - gpt-5.4-mini
          - glm-4.7-thinking
          - deepseek-v3.2
          - qwen3-235b
          - mistral-large-3
          - llama-4-405b
          - command-r-plus-248b

env:
  CI: true
  NODE_VERSION: '24'

concurrency:
  group: vulture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.vars.outputs.pages }}
      llm: ${{ steps.vars.outputs.llm }}
    steps:
      - id: vars
        run: |
          echo "pages=${{ github.event.inputs.pages_to_generate || 50 }}" >> $GITHUB_OUTPUT
          echo "llm=${{ github.event.inputs.llm_model || 'grok-4.1' }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Generate pages
        env:
          LLM_MODEL: ${{ needs.setup.outputs.llm }}
          BATCH_START: 1
          BATCH_END: ${{ needs.setup.outputs.pages }}
        run: node vulture-generator.js
      - name: SEO
        run: |
          node seo-meta-injector.js || echo "SEO skipped"
          node generate-sitemap.js || echo "Sitemap skipped"
          node generate-index.js || echo "Index skipped"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'

  deploy:
    needs: build
    environment:
      name: github-pages  # ✅ FIXED deploy error
      url: ${{ github.repository_owner }}.github.io/manychat
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4

  report:
    needs: [deploy, setup]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "✅ ${{ needs.setup.outputs.pages }} pages deployed"
          echo "🤖 ${{ needs.setup.outputs.llm }}"
          echo "🌐 https://${{ github.repository_owner }}.github.io/manychat"
