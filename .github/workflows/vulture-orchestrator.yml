on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 1 PM UTC

  workflow_dispatch:
    description: "Manual run of Vulture Factory Orchestrator"
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - generate-only
          - deploy-only

      force_rebuild:
        description: "Force rebuild all pages"
        required: false
        default: false
        type: boolean

      debug:
        description: "Enable debug logging"
        required: false
        default: false
        type: boolean

  push:
    paths:
      - 'vulture-*.js'
      - 'generator-*.js'
      - 'pages/**'
      - '.github/workflows/**'
