name: Vulture Factory Orchestrator

on:
  schedule:
    - cron: '0 13 * * *'
  # This section enables the "Run workflow" button in the Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options: [full, generate-only, deploy-only]
      force_rebuild:
        description: "Force rebuild all pages"
        required: false
        default: false
        type: boolean
      debug:
        description: "Enable debug logging"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - 'vulture-*.js'
      - 'generator-*.js'
      - 'pages/**'
      - '.github/workflows/**'

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Self-healing: uses built-in caching to prevent partial install errors

      - name: Install Dependencies
        run: npm ci # Uses clean install for consistency

      - name: Run Vulture Factory Orchestrator (with Retries)
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: |
            # Handles both manual (inputs) and automated (defaults) triggers
            MODE="${{ github.event.inputs.mode || 'full' }}"
            FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
            DEBUG="${{ github.event.inputs.debug || 'false' }}"
            
            echo "Starting Orchestrator | Mode: $MODE | Force: $FORCE"
            node vulture-orchestrator.js --mode=$MODE --force=$FORCE --debug=$DEBUG

      - name: Automatic Repair on Failure
        if: failure()
        run: |
          echo "⚠️ Primary attempts failed. Initiating self-repair sequence..."
          # Clean local caches that might be corrupted
          rm -rf node_modules/.cache
          # Run the specific repair tool
          node vulture-repair-tool.js || echo "❌ Self-repair failed. Intervention required."
