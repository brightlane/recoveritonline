name: Vulture Factory Orchestrator

on:
  push:
  pull_request:

jobs:
  orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (safe CI mode)
        run: npm install --legacy-peer-deps

      - name: Run orchestrator
        run: npm run orchestrator
