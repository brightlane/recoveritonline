on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options: [full, generate-only, deploy-only]
      force_rebuild:
        description: "Force rebuild all pages"
        required: false
        default: false
        type: boolean
      debug:
        description: "Enable debug logging"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - 'vulture-*.js'
      - 'generator-*.js'
      - 'pages/**'
      - '.github/workflows/**'

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # SELF-HEALING STEP: Retry logic for the main orchestrator
      - name: Run Vulture Factory Orchestrator
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: |
            echo "Starting Orchestrator in ${{ github.event.inputs.mode || 'full' }} mode..."
            node vulture-orchestrator.js --mode=${{ github.event.inputs.mode || 'full' }} --force=${{ github.event.inputs.force_rebuild || 'false' }}

      # REPAIR STEP: Executes only if the previous step ultimately fails after 3 tries
      - name: Automatic Repair / Cleanup
        if: failure()
        run: |
          echo "Detecting corruption or state errors..."
          # Example repair commands:
          rm -rf node_modules/.cache
          npm cache clean --force
          echo "Attempting emergency one-time recovery run..."
          node vulture-repair-tool.js || echo "Self-repair failed. Manual intervention required."
